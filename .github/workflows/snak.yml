name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # se actualiza todos los días a medianoche UTC
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generar la animación de la serpiente
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23006d32&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2339d353

      - name: Subir la animación a una rama "output"
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
